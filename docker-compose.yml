services:
  monitor:
    build: ./monitor
    container_name: hnm-monitor
    restart: always
    env_file:
      - .env
    cap_add:
      - NET_RAW
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    networks:
      - netmon
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  settings:
    build: ./settings
    container_name: hnm-settings
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/config/.env
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ENV_PATH=/config/.env
      - COMPOSE_PROJECT=home-network-monitor
    networks:
      - netmon
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  lanscan:
    build: ./lanscan
    container_name: hnm-lanscan
    restart: always
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics', timeout=5)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hnm-prometheus
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - netmon
    depends_on:
      monitor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hnm-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/home-network-monitor.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - netmon
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  netmon:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
